<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS_HUBくん</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif; font-size: 14px; background: #f1f5f9; color: #1e293b; }

/* Global transitions */
a, button, input, select, textarea, .badge, .kpi-card, .alert-card, .kanban-card, .nav-item, .tab-item, .header-btn, .btn, .staff-table tr, .task-table tr, .alert-row {
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Custom scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #64748b; }

/* Text selection */
::selection { background: #3b82f6; color: #fff; }

/* Header — gradient background */
.header { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%); color: #fff; height: 56px; display: flex; align-items: center; padding: 0 20px; gap: 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,.3); }
.header h1 { font-size: 17px; font-weight: 800; letter-spacing: .5px; flex: 1; background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
/* Header buttons — glassmorphism */
.header-btn { background: rgba(255,255,255,.1); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,.15); color: #cbd5e1; padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 5px; font-weight: 500; }
.header-btn:hover { background: rgba(255,255,255,.2); color: #fff; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.2); }
.header-btn.active { background: linear-gradient(135deg, #3b82f6, #6366f1); color: #fff; border-color: transparent; }

/* Nav — translucent + blur */
.nav { background: rgba(255,255,255,.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226,232,240,.6); padding: 0 20px; display: flex; gap: 4px; }
.nav-item { padding: 12px 16px; cursor: pointer; font-size: 14px; border-bottom: 3px solid transparent; color: #64748b; font-weight: 500; position: relative; }
.nav-item:hover { color: #1e293b; }
.nav-item.active { color: #3b82f6; border-bottom-color: transparent; }
.nav-item.active::after { content: ''; position: absolute; bottom: 0; left: 8px; right: 8px; height: 3px; background: linear-gradient(90deg, #3b82f6, #6366f1, #a78bfa); border-radius: 3px 3px 0 0; }

/* Main */
.main { padding: 20px; max-width: 1400px; margin: 0 auto; }

/* KPI Cards — color top-line + hover lift */
.kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 20px; }
.kpi-card { background: #fff; border-radius: 12px; padding: 18px 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04); position: relative; overflow: hidden; }
.kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #3b82f6, #6366f1); }
.kpi-card:nth-child(2)::before { background: linear-gradient(90deg, #6366f1, #8b5cf6); }
.kpi-card:nth-child(3)::before { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
.kpi-card:nth-child(4)::before { background: linear-gradient(90deg, #10b981, #34d399); }
.kpi-card:nth-child(5)::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
.kpi-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,.1); }
.kpi-label { font-size: 12px; color: #94a3b8; font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
.kpi-value { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #1e293b, #475569); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.kpi-value.blue { background: linear-gradient(135deg, #3b82f6, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.kpi-value.green { background: linear-gradient(135deg, #10b981, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

/* Alert Cards — gradient headers */
.alert-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
.alert-card { background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04); overflow: hidden; }
.alert-card:hover { box-shadow: 0 8px 25px rgba(0,0,0,.08); }
.alert-header { padding: 12px 16px; display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 13px; }
.alert-header .count { margin-left: auto; font-size: 20px; font-weight: 800; }
.alert-header.red   { background: linear-gradient(135deg, #fef2f2, #fee2e2); color: #dc2626; }
.alert-header.amber { background: linear-gradient(135deg, #fffbeb, #fef3c7); color: #d97706; }
.alert-header.slate { background: linear-gradient(135deg, #f8fafc, #f1f5f9); color: #475569; }
.alert-list { padding: 8px 0; max-height: 400px; overflow-y: auto; }
.alert-footer { padding: 8px 16px; text-align: center; border-top: 1px solid #f1f5f9; }
.alert-footer a { font-size: 12px; color: #3b82f6; text-decoration: none; cursor: pointer; }
.alert-footer a:hover { text-decoration: underline; }
.alert-row { padding: 7px 16px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 8px; }
.alert-row:last-child { border-bottom: none; }
.alert-row:hover { background: linear-gradient(90deg, #f8fafc, #eff6ff); padding-left: 20px; }
.alert-empty { padding: 16px; text-align: center; color: #94a3b8; font-size: 13px; }

/* Staff table — gradient header */
.section-title { font-size: 14px; font-weight: 700; color: #475569; margin-bottom: 10px; }
.staff-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04); }
.staff-table th { background: linear-gradient(135deg, #f8fafc, #f1f5f9); padding: 10px 16px; text-align: left; font-size: 12px; color: #64748b; font-weight: 600; border-bottom: 1px solid #e2e8f0; }
.staff-table td { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
.staff-table tr:last-child td { border-bottom: none; }
.staff-table tr:hover td { background: linear-gradient(90deg, transparent, #eff6ff, transparent); }

/* Task tabs */
.task-tabs { background: #fff; border-radius: 12px 12px 0 0; border-bottom: 1px solid #e2e8f0; padding: 0 16px; display: flex; gap: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.tab-item { padding: 12px 14px; cursor: pointer; font-size: 13px; font-weight: 500; color: #64748b; border-bottom: 3px solid transparent; white-space: nowrap; position: relative; }
.tab-item:hover { color: #1e293b; }
.tab-item.active { color: #3b82f6; border-bottom-color: transparent; }
.tab-item.active::after { content: ''; position: absolute; bottom: 0; left: 4px; right: 4px; height: 3px; background: linear-gradient(90deg, #3b82f6, #6366f1); border-radius: 3px 3px 0 0; }
.tab-badge { display: inline-flex; align-items: center; justify-content: center; background: #e2e8f0; color: #475569; border-radius: 10px; font-size: 11px; min-width: 20px; height: 18px; padding: 0 5px; margin-left: 5px; }
.tab-badge.blue { background: linear-gradient(135deg, #dbeafe, #c7d2fe); color: #1d4ed8; }

/* Toolbar */
.toolbar { background: #fff; padding: 10px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #e2e8f0; }
.search-input { border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 12px; font-size: 13px; width: 220px; outline: none; background: #f8fafc; font-family: inherit; }
.search-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); background: #fff; }
.filter-select { border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 10px; font-size: 13px; outline: none; cursor: pointer; background: #f8fafc; font-family: inherit; }
.filter-select:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); background: #fff; }
.ml-auto { margin-left: auto; }
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; }
.btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; box-shadow: 0 2px 8px rgba(59,130,246,.3); }
.btn-primary:hover { background: linear-gradient(135deg, #2563eb, #1d4ed8); box-shadow: 0 4px 14px rgba(59,130,246,.4); transform: translateY(-1px); }
.btn-danger  { background: linear-gradient(135deg, #fee2e2, #fecaca); color: #dc2626; }
.btn-danger:hover { background: linear-gradient(135deg, #fecaca, #fca5a5); }
.btn-slate   { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
.btn-slate:hover { background: #e2e8f0; }

/* Bulk bar */
.bulk-bar { background: linear-gradient(135deg, #1e293b, #334155); color: #fff; padding: 10px 16px; display: flex; align-items: center; gap: 10px; font-size: 13px; }
.bulk-bar select { background: rgba(255,255,255,.1); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,.15); color: #fff; padding: 5px 8px; border-radius: 6px; font-size: 12px; cursor: pointer; }
.bulk-bar .btn { padding: 5px 12px; font-size: 12px; }

/* Task table — gradient header */
.task-wrap { background: #fff; border-radius: 0 0 12px 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06); overflow: hidden; }
.task-table { width: 100%; border-collapse: collapse; }
.task-table th { background: linear-gradient(135deg, #f8fafc, #f1f5f9); padding: 9px 12px; text-align: left; font-size: 12px; color: #64748b; font-weight: 600; border-bottom: 1px solid #e2e8f0; white-space: nowrap; }
.task-table td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
.task-table tr:last-child td { border-bottom: none; }
.task-table tr:hover td { background: linear-gradient(90deg, transparent, #eff6ff, transparent); cursor: pointer; }
.task-table tr.selected td { background: #eff6ff; }
.task-table input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: #3b82f6; }
.task-title { font-weight: 500; color: #1e293b; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.task-body-hint { font-size: 12px; color: #94a3b8; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.unread-dot { display: inline-block; width: 8px; height: 8px; background: #10b981; border-radius: 50%; margin-left: 6px; vertical-align: middle; animation: pulse-dot 1.5s infinite; }
@keyframes pulse-dot { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .6; transform: scale(1.3); } }
.empty-state { padding: 48px; text-align: center; color: #94a3b8; }

/* Badges — micro-gradient backgrounds */
.badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 12px; font-size: 12px; font-weight: 600; white-space: nowrap; }
.badge-kaneko { background: linear-gradient(135deg, #dbeafe, #c7d2fe); color: #1d4ed8; }
.badge-wada   { background: linear-gradient(135deg, #d1fae5, #a7f3d0); color: #065f46; }
.badge-fukue  { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; }
.badge-none   { background: #f1f5f9; color: #64748b; border: 1px dashed #cbd5e1; }
.badge-urgent { background: linear-gradient(135deg, #fee2e2, #fecaca); color: #dc2626; animation: pulse-badge 2s ease-in-out infinite; }
@keyframes pulse-badge { 0%,100% { opacity: 1; } 50% { opacity: .75; } }
.badge-high   { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #d97706; }
.badge-normal { background: linear-gradient(135deg, #eff6ff, #dbeafe); color: #3b82f6; }
.badge-low    { background: #f8fafc; color: #94a3b8; }
.badge-open       { background: linear-gradient(135deg, #f1f5f9, #e2e8f0); color: #475569; }
.badge-in_progress{ background: linear-gradient(135deg, #dbeafe, #c7d2fe); color: #1d4ed8; }
.badge-done       { background: linear-gradient(135deg, #d1fae5, #a7f3d0); color: #065f46; }
.badge-closed     { background: #f1f5f9; color: #94a3b8; }

/* Modal — blur overlay + slide-up animation */
.overlay { position: fixed; inset: 0; background: rgba(15,23,42,.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 200; display: none; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
@keyframes modal-slide-up { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
.modal { background: #fff; border-radius: 16px; width: 720px; max-width: 95vw; max-height: 88vh; display: flex; flex-direction: column; box-shadow: 0 25px 60px rgba(0,0,0,.2), 0 0 0 1px rgba(0,0,0,.05); animation: modal-slide-up 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
.modal-header { padding: 18px 22px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: flex-start; gap: 12px; }
.modal-header h2 { font-size: 16px; font-weight: 700; flex: 1; line-height: 1.4; }
.modal-close { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 20px; padding: 2px 6px; border-radius: 6px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
.modal-close:hover { background: #fee2e2; color: #dc2626; transform: rotate(90deg); }
.modal-body { padding: 20px 22px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 16px; }
.modal-footer { padding: 14px 22px; border-top: 1px solid #e2e8f0; display: flex; align-items: center; gap: 8px; }

/* Form fields — focus ring */
.field { display: flex; flex-direction: column; gap: 5px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
.field label { font-size: 12px; font-weight: 600; color: #64748b; }
.field input, .field select, .field textarea { border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 10px; font-size: 13px; outline: none; font-family: inherit; background: #f8fafc; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
.field input:focus, .field select:focus, .field textarea:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); background: #fff; }
.field textarea { resize: vertical; min-height: 80px; }

/* Thread */
.thread-section { border-top: 1px solid #e2e8f0; padding-top: 16px; }
.thread-title { font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 10px; }
.thread-list { display: flex; flex-direction: column; gap: 10px; max-height: 280px; overflow-y: auto; padding: 2px; }
.thread-msg { padding: 10px 12px; border-radius: 8px; font-size: 13px; line-height: 1.5; }
.thread-msg.inbound  { background: #f8fafc; border-left: 3px solid #cbd5e1; }
.thread-msg.outbound { background: #eff6ff; border-left: 3px solid #3b82f6; }
.thread-meta { font-size: 12px; color: #475569; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; font-weight: 600; }
.thread-meta .thread-time { font-size: 11px; color: #94a3b8; font-weight: 400; }
.thread-avatar { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
.thread-avatar.inbound  { background: linear-gradient(135deg, #64748b, #475569); }
.thread-avatar.outbound { background: linear-gradient(135deg, #3b82f6, #6366f1); }
.reply-row { display: flex; flex-direction: column; gap: 8px; }
.reply-row textarea { width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 12px; font-size: 13px; resize: vertical; min-height: 150px; outline: none; font-family: inherit; background: #f8fafc; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
.reply-row textarea:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); background: #fff; }
.reply-actions { display: flex; align-items: center; gap: 8px; }
.attach-btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc; color: #64748b; cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
.attach-btn:hover { background: #eff6ff; border-color: #93c5fd; color: #3b82f6; }
.attach-info { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #475569; background: #f1f5f9; padding: 4px 10px; border-radius: 6px; }
.attach-info .remove-attach { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1; }
.attach-info .remove-attach:hover { color: #dc2626; }
.attach-preview { max-width: 120px; max-height: 80px; border-radius: 6px; border: 1px solid #e2e8f0; object-fit: cover; }
#attach-preview-area { display: flex; flex-wrap: wrap; gap: 8px; }
#attach-info { display: flex; flex-wrap: wrap; gap: 4px; }
.reply-actions .btn-primary { margin-left: auto; }
.preview-toggle { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc; color: #64748b; cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
.preview-toggle:hover { background: #eff6ff; border-color: #93c5fd; color: #3b82f6; }
.preview-toggle.active { background: #eff6ff; border-color: #3b82f6; color: #3b82f6; }
/* Chatwork風プレビュー */
.cw-preview-wrap { background: #e8e5df; border-radius: 8px; padding: 16px; max-height: 400px; overflow-y: auto; }
.cw-preview-bubble { display: flex; gap: 10px; align-items: flex-start; }
.cw-preview-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #3b82f6, #6366f1); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.cw-preview-body { flex: 1; background: #fff; border-radius: 0 8px 8px 8px; padding: 10px 14px; font-size: 13px; line-height: 1.7; color: #333; word-wrap: break-word; box-shadow: 0 1px 2px rgba(0,0,0,.08); }
.cw-preview-sender { font-size: 12px; font-weight: 700; color: #1a6ed8; margin-bottom: 4px; }
.cw-preview-body .cw-info { background: #e8f4e8; border-left: 4px solid #6eb86e; border-radius: 0; padding: 8px 12px; margin: 6px 0; white-space: pre-wrap; }
.cw-preview-body .cw-info-title { font-weight: 700; color: #333; border-bottom: 1px solid #c5dcc5; padding-bottom: 4px; margin-bottom: 4px; }
.cw-preview-body .cw-code { background: #263238; color: #e8e8e8; border-radius: 4px; padding: 8px 12px; margin: 6px 0; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
.cw-preview-body .cw-hr { border: none; border-top: 1px solid #ccc; margin: 8px 0; }
.cw-preview-body .cw-mention { color: #1a6ed8; font-weight: 600; }
.cw-preview-body .cw-link { color: #1a6ed8; text-decoration: underline; }
.cw-preview-empty { color: #94a3b8; font-style: italic; }
/* TO追加UI */
.to-selector { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.to-tag { display: inline-flex; align-items: center; gap: 4px; background: #dbeafe; color: #1d4ed8; padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.to-tag button { background: none; border: none; color: #3b82f6; cursor: pointer; font-size: 13px; padding: 0 1px; line-height: 1; }
.to-tag button:hover { color: #dc2626; }
.to-add-btn { display: inline-flex; align-items: center; gap: 3px; padding: 4px 10px; border-radius: 12px; border: 1px dashed #93c5fd; background: transparent; color: #3b82f6; cursor: pointer; font-size: 12px; font-family: inherit; transition: all 0.2s; }
.to-add-btn:hover { background: #eff6ff; border-style: solid; }
.to-all-btn { display: inline-flex; align-items: center; gap: 3px; padding: 4px 10px; border-radius: 12px; border: 1px solid #f59e0b; background: transparent; color: #d97706; cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; transition: all 0.2s; }
.to-all-btn:hover { background: #fffbeb; }
.to-all-btn.active { background: #fef3c7; border-color: #d97706; color: #92400e; }
.to-all-tag { display: inline-flex; align-items: center; gap: 4px; background: #fef3c7; color: #92400e; padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: 700; }
.to-all-tag button { background: none; border: none; color: #d97706; cursor: pointer; font-size: 13px; padding: 0 1px; line-height: 1; }
.to-all-tag button:hover { color: #dc2626; }
.to-dropdown { position: absolute; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.12); padding: 4px 0; z-index: 300; max-height: 200px; overflow-y: auto; min-width: 180px; }
.to-dropdown-item { padding: 8px 14px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
.to-dropdown-item:hover { background: #eff6ff; }
.to-dropdown-item .to-dropdown-avatar { width: 24px; height: 24px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #475569; }

/* Spinner */
.spin { display: inline-block; width: 16px; height: 16px; border: 2px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Kanban — gradient column headers + card effects */
.kanban-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; align-items: start; }
.kanban-col { background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04); overflow: hidden; }
.kanban-col-header { padding: 12px 16px; font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px; }
.kanban-col-header .col-count { margin-left: auto; background: rgba(255,255,255,.25); border-radius: 10px; padding: 2px 8px; font-size: 12px; }
.kanban-col-header.inbox  { background: linear-gradient(135deg, #1e293b, #334155); color: #fff; }
.kanban-col-header.kaneko { background: linear-gradient(135deg, #1d4ed8, #3b82f6); color: #fff; }
.kanban-col-header.wada   { background: linear-gradient(135deg, #065f46, #10b981); color: #fff; }
.kanban-col-header.fukue  { background: linear-gradient(135deg, #92400e, #d97706); color: #fff; }
.kanban-drop-zone { min-height: 120px; padding: 8px; display: flex; flex-direction: column; gap: 6px; transition: all .2s cubic-bezier(0.4, 0, 0.2, 1); }
.kanban-drop-zone.drag-over { background: #eff6ff; border: 2px dashed #93c5fd; border-radius: 0 0 12px 12px; }
.kanban-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 12px; cursor: grab; user-select: none; transition: all .2s cubic-bezier(0.4, 0, 0.2, 1); }
.kanban-card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,.08); border-color: #cbd5e1; }
.kanban-card:active { cursor: grabbing; }
.kanban-card.dragging { opacity: .5; box-shadow: 0 12px 32px rgba(0,0,0,.18); transform: rotate(2deg) scale(1.04); }
.kanban-card-title { font-size: 13px; font-weight: 500; color: #1e293b; margin-bottom: 5px; line-height: 1.4; }
.kanban-card-meta  { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.kanban-card-sender { font-size: 11px; color: #94a3b8; }
.kanban-empty { padding: 24px 16px; text-align: center; color: #cbd5e1; font-size: 13px; }

.badge-hotta { background: linear-gradient(135deg, #fce7f3, #fbcfe8); color: #9d174d; }

/* Responsive */
@media (max-width: 900px) {
  .kpi-grid { grid-template-columns: repeat(3, 1fr); }
  .alert-grid { grid-template-columns: 1fr; }
  .field-row { grid-template-columns: 1fr 1fr; }
  .kanban-board { grid-template-columns: 1fr 1fr; }

}
@media (max-width: 640px) {
  .header { padding: 0 12px; gap: 8px; }
  .header h1 { font-size: 15px; }
  .nav { padding: 0 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .nav-item { padding: 10px 12px; font-size: 13px; white-space: nowrap; }
  .main { padding: 12px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .kpi-card { padding: 14px 16px; }
  .kpi-value { font-size: 24px; }
  .alert-grid { gap: 8px; }
  .field-row { grid-template-columns: 1fr; }
  .kanban-board { grid-template-columns: 1fr; }
  .modal { max-width: 100vw; max-height: 95vh; border-radius: 12px 12px 0 0; }
  .toolbar { flex-wrap: wrap; }
  .search-input { width: 100%; }
}
</style>
</head>
<body>

<div class="header">
  <h1>💬 CS_HUBくん</h1>
  <button class="header-btn" id="btn-poll" onclick="manualPoll()">🔄 今すぐ取得</button>
  <button class="header-btn" onclick="openNewTask()">＋ 新規タスク</button>
  <button class="header-btn" onclick="openNewMessage()">✉ 新規メッセージ</button>
</div>

<div class="nav">
  <div class="nav-item active" data-page="dashboard" onclick="switchPage('dashboard', this)">ダッシュボード</div>
  <div class="nav-item" data-page="tasks" onclick="switchPage('tasks', this)">タスク一覧</div>
  <div class="nav-item" data-page="assign" onclick="switchPage('assign', this)">📥 振り分け</div>
  <div class="nav-item" data-page="recurring" onclick="switchPage('recurring', this)">定期タスク</div>
  <div class="nav-item" data-page="settings" onclick="switchPage('settings', this)">⚙️ 設定</div>
</div>

<div class="main" id="main-content"></div>

<!-- Task Modal -->
<div class="overlay" id="task-overlay" onclick="maybeCloseModal(event)">
  <div class="modal" id="task-modal">
    <div class="modal-header">
      <h2 id="modal-title">タスク詳細</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
const STAFF = ['金子', '和田', '福江'];
const STATUS_LABELS  = { open: '未対応', in_progress: '対応中', done: '完了', closed: 'クローズ' };
const PRIORITY_LABELS= { low: '低', normal: '中', high: '高', urgent: '緊急' };

let state = {
  page: 'dashboard',
  tab: 'all',
  tasks: [],
  selected: new Set(),
  filters: { status: '', priority: '', search: '' },
  dashData: null,
  editingId: null,
};

// ─── API ───────────────────────────────────────────────────
const api = {
  async get(path) {
    const r = await fetch(path);
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async post(path, data) {
    const r = await fetch(path, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async put(path, data) {
    const r = await fetch(path, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async del(path) {
    const r = await fetch(path, { method: 'DELETE' });
    if (!r.ok && r.status !== 204) throw new Error(await r.text());
  },
};

// ─── Navigation ────────────────────────────────────────────
function switchPage(page, el) {
  state.page = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  render();
}

// ─── Render dispatcher ─────────────────────────────────────
async function render() {
  if (state.page === 'dashboard') await renderDashboard();
  else if (state.page === 'tasks')     await renderTasks();
  else if (state.page === 'assign')    await renderAssign();
  else if (state.page === 'recurring') await renderRecurring();
  else if (state.page === 'settings')  await renderSettings();
}

// ─── Dashboard ─────────────────────────────────────────────
async function renderDashboard() {
  const el = document.getElementById('main-content');
  el.innerHTML = '<div style="padding:40px;text-align:center"><div class="spin"></div></div>';
  try {
    const d = await api.get('/api/dashboard');
    state.dashData = d;
    const k = d.kpi;
    el.innerHTML = `
      <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-label">受信タスク</div><div class="kpi-value blue">${k.inbound}</div></div>
        <div class="kpi-card"><div class="kpi-label">手動作成</div><div class="kpi-value">${k.outbound}</div></div>
        <div class="kpi-card"><div class="kpi-label">合計タスク</div><div class="kpi-value">${k.total}</div></div>
        <div class="kpi-card"><div class="kpi-label">完了済み</div><div class="kpi-value green">${k.done}</div></div>
        <div class="kpi-card"><div class="kpi-label">完了率</div><div class="kpi-value">${k.completion_rate}%</div></div>
      </div>
      <div class="alert-grid">
        ${renderAlertCard('未担当タスク', d.alerts.unassigned, 'slate', '👤', "state.page=\\'tasks\\';state.filterAssignee=\\'unassigned\\';render()")}
        ${renderAlertCard('期限超過', d.alerts.overdue, 'red', '🚨')}
        ${renderAlertCard('2時間以上未返信', d.alerts.no_reply, 'amber', '💬')}
      </div>
      <div class="section-title">担当者別パフォーマンス</div>
      <table class="staff-table">
        <thead><tr>
          <th>担当者</th><th>保有タスク</th><th>今月完了</th><th>平均対応日数</th>
        </tr></thead>
        <tbody>${d.staff.map(s => `
          <tr>
            <td><span class="badge ${staffClass(s.name)}">${s.name}</span></td>
            <td>${s.holding}</td>
            <td>${s.done_month}</td>
            <td>${s.avg_days != null ? s.avg_days + '日' : '—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    `;
  } catch(e) {
    el.innerHTML = `<div style="padding:20px;color:#dc2626">読み込みエラー: ${e.message}</div>`;
  }
}

function renderAlertCard(label, items, type, icon, filterFn) {
  const rows = items.length === 0
    ? `<div class="alert-empty">問題なし ✓</div>`
    : items.map(t => `
        <div class="alert-row" onclick="openTask(${t.id})">
          <span class="badge ${staffClass(t.assignee)}">${t.assignee || '未担当'}</span>
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.summary || t.title)}${t.unread_reply ? '<span class="unread-dot" title="新着返信あり"></span>' : ''}</span>
          ${t.due_date ? `<span style="font-size:11px;color:#94a3b8">${t.due_date}</span>` : ''}
        </div>`).join('');
  const footer = items.length > 0 && filterFn
    ? `<div class="alert-footer"><a onclick="${filterFn}">タスク一覧で全件表示 →</a></div>`
    : '';
  return `
    <div class="alert-card">
      <div class="alert-header ${type}">
        <span>${icon} ${label}</span>
        <span class="count">${items.length}</span>
      </div>
      <div class="alert-list">${rows}</div>
      ${footer}
    </div>`;
}

// ─── Task List ─────────────────────────────────────────────
async function renderTasks() {
  const el = document.getElementById('main-content');
  const params = new URLSearchParams();
  const isDoneTab = state.tab === '完了';

  if (!isDoneTab) {
    if (state.tab !== 'all' && state.tab !== '未担当') params.set('assignee', state.tab);
    if (state.tab === '未担当') params.set('assignee', '未担当');
    if (state.filters.status)   params.set('status',   state.filters.status);
  }
  if (state.filters.priority) params.set('priority', state.filters.priority);
  if (state.filters.search)   params.set('search',   state.filters.search);

  try {
    let tasks = await api.get('/api/tasks?' + params);
    if (isDoneTab) {
      state.tasks = tasks.filter(t => ['done','closed'].includes(t.status));
    } else if (!state.filters.status) {
      state.tasks = tasks.filter(t => !['done','closed'].includes(t.status));
    } else {
      state.tasks = tasks;
    }
  } catch(e) { state.tasks = []; }

  const counts = await getTabCounts();

  const tabs = ['all', ...STAFF, '未担当', '完了'];
  const tabsHtml = tabs.map(t => {
    const label = t === 'all' ? 'すべて' : t === '完了' ? '✅ 完了' : t;
    const cnt   = counts[t] || 0;
    const isActive = state.tab === t;
    return `<div class="tab-item ${isActive?'active':''}" onclick="switchTab('${t}')">${label}<span class="tab-badge ${isActive?'blue':''}">${cnt}</span></div>`;
  }).join('');

  const bulkBar = state.selected.size > 0 ? renderBulkBar() : '';

  const rows = state.tasks.length === 0
    ? `<tr><td colspan="8"><div class="empty-state">タスクがありません</div></td></tr>`
    : state.tasks.map(t => renderTaskRow(t)).join('');

  el.innerHTML = `
    <div class="task-tabs">${tabsHtml}</div>
    <div class="toolbar">
      <input class="search-input" type="text" placeholder="🔍 タスクを検索..." value="${esc(state.filters.search)}" oninput="debounceSearch(this.value)">
      <select class="filter-select" onchange="setFilter('status', this.value)">
        <option value="">すべてのステータス</option>
        <option value="open" ${state.filters.status==='open'?'selected':''}>未対応</option>
        <option value="in_progress" ${state.filters.status==='in_progress'?'selected':''}>対応中</option>
        <option value="done" ${state.filters.status==='done'?'selected':''}>完了</option>
        <option value="closed" ${state.filters.status==='closed'?'selected':''}>クローズ</option>
      </select>
      <select class="filter-select" onchange="setFilter('priority', this.value)">
        <option value="">すべての優先度</option>
        <option value="urgent" ${state.filters.priority==='urgent'?'selected':''}>緊急</option>
        <option value="high"   ${state.filters.priority==='high'?'selected':''}>高</option>
        <option value="normal" ${state.filters.priority==='normal'?'selected':''}>中</option>
        <option value="low"    ${state.filters.priority==='low'?'selected':''}>低</option>
      </select>
      <button class="btn btn-primary ml-auto" onclick="openNewTask()">＋ 新規タスク</button>
    </div>
    ${bulkBar}
    <div class="task-wrap">
      <table class="task-table">
        <thead><tr>
          <th><input type="checkbox" id="chk-all" onclick="toggleAllSelect(this)"></th>
          <th>タスク</th>
          <th>担当者</th>
          <th>優先度</th>
          <th>期限</th>
          <th>ステータス</th>
          <th>作成日</th>
          <th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

let _allTasksCache = null;
let _allTasksCacheAt = 0;
async function getAllTasksCached() {
  if (_allTasksCache && Date.now() - _allTasksCacheAt < 15000) return _allTasksCache;
  _allTasksCache = await api.get('/api/tasks');
  _allTasksCacheAt = Date.now();
  return _allTasksCache;
}
function invalidateTasksCache() { _allTasksCache = null; }

async function getTabCounts() {
  const counts = { all: 0, '未担当': 0, '完了': 0 };
  STAFF.forEach(s => counts[s] = 0);
  try {
    const all = await getAllTasksCached();
    all.forEach(t => {
      const done = ['done','closed'].includes(t.status);
      if (done) { counts['完了']++; return; }
      counts.all++;
      if (!t.assignee) counts['未担当']++;
      else if (counts[t.assignee] !== undefined) counts[t.assignee]++;
    });
  } catch(e) {}
  return counts;
}

function renderTaskRow(t) {
  const sel = state.selected.has(t.id);
  const due = t.due_date ? dueDateDisplay(t.due_date) : '<span style="color:#cbd5e1">—</span>';
  return `
    <tr class="${sel?'selected':''}" data-id="${t.id}">
      <td onclick="event.stopPropagation()"><input type="checkbox" ${sel?'checked':''} onclick="toggleSelect(${t.id}, this)"></td>
      <td onclick="openTask(${t.id})">
        <div class="task-title">${esc(t.summary || t.title)}${t.unread_reply ? '<span class="unread-dot" title="新着返信あり"></span>' : ''}</div>
        <div class="task-body-hint">
          ${t.sender_name ? `依頼: ${esc(t.sender_name)}` : ''}
          ${t.chatwork_room_name ? ` · 📢 ${esc(t.chatwork_room_name)}` : ''}
        </div>
      </td>
      <td onclick="openTask(${t.id})"><span class="badge ${staffClass(t.assignee)}">${t.assignee || '未担当'}</span></td>
      <td onclick="openTask(${t.id})"><span class="badge badge-${t.priority}">${PRIORITY_LABELS[t.priority]||t.priority}</span></td>
      <td onclick="openTask(${t.id})">${due}</td>
      <td onclick="openTask(${t.id})"><span class="badge badge-${t.status}">${STATUS_LABELS[t.status]||t.status}</span></td>
      <td onclick="openTask(${t.id})" style="color:#94a3b8;font-size:12px">${fmtDate(t.created_at)}</td>
      <td onclick="event.stopPropagation()" style="white-space:nowrap">
        ${!['done','closed'].includes(t.status)
          ? `<button class="btn" style="padding:4px 8px;font-size:11px;background:#d1fae5;color:#065f46" onclick="completeTask(${t.id})">✅</button> `
          : ''}
        <button class="btn btn-danger" style="padding:4px 8px;font-size:11px" onclick="deleteTask(${t.id})">削除</button>
      </td>
    </tr>`;
}

function dueDateDisplay(due) {
  const d   = new Date(due);
  const now = new Date(); now.setHours(0,0,0,0);
  const diff= Math.round((d - now) / 86400000);
  const fmt = `${d.getMonth()+1}/${d.getDate()}`;
  if (diff < 0)  return `<span style="color:#dc2626;font-weight:600">${fmt} (${-diff}日超過)</span>`;
  if (diff === 0)return `<span style="color:#d97706;font-weight:600">${fmt} (今日)</span>`;
  if (diff <= 2) return `<span style="color:#d97706">${fmt} (あと${diff}日)</span>`;
  return fmt;
}

function renderBulkBar() {
  return `
    <div class="bulk-bar">
      <span>${state.selected.size}件選択中</span>
      <select id="bulk-assignee" style="margin-left:8px">
        <option value="">担当者を変更</option>
        ${STAFF.map(s => `<option value="${s}">${s}</option>`).join('')}
      </select>
      <select id="bulk-priority">
        <option value="">優先度を変更</option>
        <option value="urgent">緊急</option>
        <option value="high">高</option>
        <option value="normal">中</option>
        <option value="low">低</option>
      </select>
      <select id="bulk-status">
        <option value="">ステータスを変更</option>
        <option value="open">未対応</option>
        <option value="in_progress">対応中</option>
        <option value="done">完了</option>
        <option value="closed">クローズ</option>
      </select>
      <input type="date" id="bulk-due" style="background:#334155;border:none;color:#fff;padding:5px 8px;border-radius:5px;font-size:12px" title="期限を変更">
      <button class="btn btn-primary" style="margin-left:4px" onclick="applyBulk()">適用</button>
      <button class="btn" style="background:#10b981;color:#fff" onclick="bulkComplete()">✅ まとめて完了</button>
      <button class="btn btn-danger" onclick="bulkDelete()">🗑 まとめて削除</button>
      <button class="btn btn-slate" onclick="clearSelection()">解除</button>
    </div>`;
}

// ─── Task Modal ────────────────────────────────────────────
async function openTask(taskId) {
  state.editingId = taskId;
  selectedTos = [];
  toAll = false;
  previewEnabled = false;
  activeTextareaId = 'reply-input';
  const [task, threads] = await Promise.all([
    api.get(`/api/tasks/${taskId}`),
    api.get(`/api/tasks/${taskId}/threads`),
  ]);
  // スレッド取得でサーバー側のunread_replyがクリアされる
  task.unread_reply = 0;
  document.getElementById('modal-title').textContent = task.summary || task.title;
  document.getElementById('modal-body').innerHTML = renderTaskModalBody(task, threads);
  document.getElementById('modal-footer').innerHTML = renderTaskModalFooter(task);
  document.getElementById('task-overlay').classList.add('open');
  // タスク行の緑ランプを即時消す
  const dot = document.querySelector(`tr[data-id="${taskId}"] .unread-dot`);
  if (dot) dot.remove();
}

function renderTaskModalBody(task, threads) {
  const threadHtml = threads.length === 0
    ? '<div style="color:#94a3b8;font-size:13px;padding:8px 0">スレッドなし</div>'
    : threads.map(m => renderThreadMsg(m)).join('');

  return `
    ${task.chatwork_room_name ? `
    <div style="background:#eff6ff;border-radius:8px;padding:9px 14px;font-size:13px;display:flex;align-items:center;gap:8px">
      <span style="color:#64748b">📢 グループ</span>
      <span style="font-weight:600;color:#1e293b;flex:1">${esc(task.chatwork_room_name)}</span>
      ${task.chatwork_message_id ? `<a href="https://www.chatwork.com/#!rid${task.chatwork_room_id}-${task.chatwork_message_id}" target="_blank" style="font-size:12px;color:#3b82f6;text-decoration:none;white-space:nowrap">メッセージを開く ↗</a>` : ''}
    </div>` : ''}
    <div class="field-row">
      <div class="field">
        <label>担当者</label>
        <select id="f-assignee" onchange="quickUpdate(${task.id}, 'assignee', this.value)">
          <option value="">未担当</option>
          ${STAFF.map(s => `<option value="${s}" ${task.assignee===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>優先度</label>
        <select id="f-priority" onchange="quickUpdate(${task.id}, 'priority', this.value)">
          <option value="low"    ${task.priority==='low'?'selected':''}>低</option>
          <option value="normal" ${task.priority==='normal'?'selected':''}>中</option>
          <option value="high"   ${task.priority==='high'?'selected':''}>高</option>
          <option value="urgent" ${task.priority==='urgent'?'selected':''}>緊急</option>
        </select>
      </div>
      <div class="field">
        <label>期限</label>
        <input type="date" id="f-due" value="${task.due_date||''}" onchange="quickUpdate(${task.id}, 'due_date', this.value)">
      </div>
      <div class="field">
        <label>ステータス</label>
        <select id="f-status" onchange="quickUpdate(${task.id}, 'status', this.value)">
          <option value="open"        ${task.status==='open'?'selected':''}>未対応</option>
          <option value="in_progress" ${task.status==='in_progress'?'selected':''}>対応中</option>
          <option value="done"        ${task.status==='done'?'selected':''}>完了</option>
          <option value="closed"      ${task.status==='closed'?'selected':''}>クローズ</option>
        </select>
      </div>
    </div>

// ─── TO Mention ────────────────────────────────────────────
let selectedTos = []; // [{account_id, name}, ...]
let toAll = false;
let roomMembersCache = {};

async function toggleToDropdown(roomId) {
  const dd = document.getElementById('to-dropdown');
  if (dd.style.display !== 'none') { dd.style.display = 'none'; return; }
  if (!roomMembersCache[roomId]) {
    dd.innerHTML = '<div style="padding:12px;text-align:center"><span class="spin"></span></div>';
    dd.style.display = 'block';
    try {
      roomMembersCache[roomId] = await api.get(`/api/chatwork/rooms/${roomId}/members`);
    } catch(e) { dd.innerHTML = '<div style="padding:12px;color:#dc2626;font-size:12px">取得失敗</div>'; return; }
  }
  const members = roomMembersCache[roomId];
  const selectedIds = selectedTos.map(t => String(t.account_id));
  const available = members.filter(m => !selectedIds.includes(String(m.account_id)));
  if (available.length === 0) {
    dd.innerHTML = '<div style="padding:12px;color:#94a3b8;font-size:12px">全員追加済み</div>';
  } else {
    dd.innerHTML = available.map(m => `
      <div class="to-dropdown-item" onclick="addTo('${m.account_id}','${esc(m.name)}')">
        <span class="to-dropdown-avatar">${esc(m.name).charAt(0)}</span>
        <span>${esc(m.name)}</span>
      </div>`).join('');
  }
  dd.style.display = 'block';
  setTimeout(() => document.addEventListener('click', closeToDropdownOnClick, {once:true}), 0);
}

function closeToDropdownOnClick(e) {
  const dd = document.getElementById('to-dropdown');
  if (dd && !dd.contains(e.target)) dd.style.display = 'none';
}

function toggleToAll() {
  toAll = !toAll;
  if (toAll) selectedTos = [];
  renderToTags();
  updatePreview();
}

function addTo(accountId, name) {
  if (toAll) return;
  if (selectedTos.some(t => String(t.account_id) === String(accountId))) return;
  selectedTos.push({account_id: accountId, name});
  renderToTags();
  document.getElementById('to-dropdown').style.display = 'none';
  updatePreview();
}

function removeTo(accountId) {
  selectedTos = selectedTos.filter(t => String(t.account_id) !== String(accountId));
  renderToTags();
  updatePreview();
}

function renderToTags() {
  const el = document.getElementById('to-tags');
  if (!el) return;
  if (toAll) {
    el.innerHTML = '<span class="to-all-tag">ALL<button onclick="toggleToAll()">✕</button></span>';
  } else {
    el.innerHTML = selectedTos.map(t =>
      `<span class="to-tag">${esc(t.name)}<button onclick="removeTo('${t.account_id}')">✕</button></span>`
    ).join('');
  }
  // TO ALL状態に応じて追加ボタンの表示切り替え
  const addBtn = document.querySelector('.to-add-btn');
  if (addBtn) addBtn.style.display = toAll ? 'none' : '';
  const allBtn = document.querySelector('.to-all-btn');
  if (allBtn) allBtn.classList.toggle('active', toAll);
}

function buildToPrefix() {
  if (toAll) return '[toall]\n';
  return selectedTos.map(t => `[To:${t.account_id}] ${t.name}さん`).join('\n') + (selectedTos.length ? '\n' : '');
}

// ─── Chatwork Preview ──────────────────────────────────────
let previewEnabled = false;

function togglePreview() {
  previewEnabled = !previewEnabled;
  const btn = document.getElementById('preview-toggle-btn');
  const area = document.getElementById('cw-preview-area');
  if (btn) btn.classList.toggle('active', previewEnabled);
  if (area) {
    area.style.display = previewEnabled ? 'block' : 'none';
    if (previewEnabled) updatePreview();
  }
}

let activeTextareaId = 'reply-input';

function updatePreview() {
  if (!previewEnabled) return;
  const area = document.getElementById('cw-preview-content');
  if (!area) return;
  const textarea = document.getElementById(activeTextareaId);
  const text = textarea ? textarea.value : '';
  if (!text.trim() && selectedTos.length === 0 && !toAll) {
    area.innerHTML = '<span class="cw-preview-empty" style="padding:16px;display:block;text-align:center">メッセージを入力するとプレビューが表示されます</span>';
    return;
  }
  const fullText = buildToPrefix() + text;
  const bodyHtml = renderChatworkMarkup(fullText);
  area.innerHTML = `
    <div class="cw-preview-bubble">
      <div class="cw-preview-avatar">H</div>
      <div style="flex:1">
        <div class="cw-preview-sender">CS_HUBくん</div>
        <div class="cw-preview-body">${bodyHtml}</div>
      </div>
    </div>`;
}

function renderChatworkMarkup(text) {
  let html = esc(text);
  // [info][title]...[/title]...[/info]
  html = html.replace(/\[info\]\[title\]([\s\S]*?)\[\/title\]([\s\S]*?)\[\/info\]/g,
    '<div class="cw-info"><div class="cw-info-title">$1</div>$2</div>');
  // [info]...[/info]
  html = html.replace(/\[info\]([\s\S]*?)\[\/info\]/g,
    '<div class="cw-info">$1</div>');
  // [code]...[/code]
  html = html.replace(/\[code\]([\s\S]*?)\[\/code\]/g,
    '<div class="cw-code">$1</div>');
  // [hr]
  html = html.replace(/\[hr\]/g, '<hr class="cw-hr">');
  // [toall]
  html = html.replace(/\[toall\]/g,
    '<span class="cw-mention">TO ALL</span>');
  // [To:12345] 名前さん
  html = html.replace(/\[To:\d+\]\s*([^\n]*)/g,
    '<span class="cw-mention">To $1</span>');
  // [rp aid=... to=...]
  html = html.replace(/\[rp\s+[^\]]*\][^\n]*/g, '');
  // [piconname:...] [picon:...]
  html = html.replace(/\[piconname:[^\]]*\]/g, '');
  html = html.replace(/\[picon:[^\]]*\]/g, '');
  // URL auto-link
  html = html.replace(/(https?:\/\/[^\s<]+)/g,
    '<span class="cw-link">$1</span>');
  // line breaks
  html = html.replace(/\n/g, '<br>');
  return html;
}

function onFileSelected(input) {
  const previewArea = document.getElementById('attach-preview-area');
  const infoEl = document.getElementById('attach-info');
  if (!input.files || input.files.length === 0) return;
  // Merge new files with existing ones
  const dt = new DataTransfer();
  const existingFiles = input._mergedFiles || [];
  existingFiles.forEach(f => dt.items.add(f));
  for (let i = 0; i < input.files.length; i++) {
    const newFile = input.files[i];
    const isDuplicate = existingFiles.some(f => f.name === newFile.name && f.size === newFile.size);
    if (!isDuplicate) dt.items.add(newFile);
  }
  input._mergedFiles = Array.from(dt.files);
  input.files = dt.files;
  refreshAttachUI();
}

function refreshAttachUI() {
  const fileInput = document.getElementById('reply-file');
  const previewArea = document.getElementById('attach-preview-area');
  const infoEl = document.getElementById('attach-info');
  const files = fileInput._mergedFiles || [];
  if (files.length === 0) {
    previewArea.style.display = 'none';
    previewArea.innerHTML = '';
    infoEl.style.display = 'none';
    return;
  }
  // Build info tags for each file
  let infoHtml = '';
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    infoHtml += `<span class="attach-info">${esc(file.name)} (${formatFileSize(file.size)})<button class="remove-attach" onclick="removeFileAt(${i})" title="削除">✕</button></span>`;
  }
  infoEl.innerHTML = infoHtml;
  infoEl.style.display = 'inline';
  // Build image previews
  previewArea.innerHTML = '';
  let hasPreview = false;
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    if (file.type.startsWith('image/')) {
      hasPreview = true;
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = document.createElement('img');
        img.src = e.target.result;
        img.className = 'attach-preview';
        previewArea.appendChild(img);
      };
      reader.readAsDataURL(file);
    }
  }
  previewArea.style.display = hasPreview ? 'flex' : 'none';
}

function removeFileAt(index) {
  const fileInput = document.getElementById('reply-file');
  const merged = fileInput._mergedFiles || [];
  merged.splice(index, 1);
  fileInput._mergedFiles = merged;
  const dt = new DataTransfer();
  merged.forEach(f => dt.items.add(f));
  fileInput.files = dt.files;
  refreshAttachUI();
}

function clearAttachment() {
  const fileInput = document.getElementById('reply-file');
  if (fileInput) { fileInput.value = ''; fileInput._mergedFiles = []; }
  const previewArea = document.getElementById('attach-preview-area');
  if (previewArea) { previewArea.style.display = 'none'; previewArea.innerHTML = ''; }
  const infoEl = document.getElementById('attach-info');
  if (infoEl) { infoEl.style.display = 'none'; infoEl.innerHTML = ''; }
}

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

async function sendReply(taskId) {
  const rawBody = document.getElementById('reply-input').value.trim();
  const fileInput = document.getElementById('reply-file');
  const hasFile = fileInput && fileInput.files && fileInput.files.length > 0;
  if (!rawBody && !hasFile) return;
  const toPrefix = buildToPrefix();
  const body = toPrefix + rawBody;
  try {
    if (hasFile) {
      const formData = new FormData();
      formData.append('body', body);
      for (let i = 0; i < fileInput.files.length; i++) {
        formData.append('files', fileInput.files[i]);
      }
      const r = await fetch(`/api/tasks/${taskId}/reply-with-file`, { method: 'POST', body: formData });
      if (!r.ok) throw new Error(await r.text());
    } else {
      await api.post(`/api/tasks/${taskId}/reply`, { body });
    }
    const threads = await api.get(`/api/tasks/${taskId}/threads`);
    document.getElementById('thread-list').innerHTML = threads.map(m => renderThreadMsg(m)).join('');
    document.getElementById('reply-input').value = '';
    selectedTos = [];
    toAll = false;
    renderToTags();
    clearAttachment();
    updatePreview();
    const tl = document.getElementById('thread-list');
    tl.scrollTop = tl.scrollHeight;
  } catch(e) { alert('送信失敗: ' + e.message); }
}

async function completeTask(taskId) {
  try {
    await api.put(`/api/tasks/${taskId}`, { status: 'done' });
    invalidateTasksCache();
    closeModal();
    if (state.page === 'assign' || state.page === 'tasks') {
      await render();
    } else {
      switchPage('dashboard', document.querySelector('[data-page="dashboard"]'));
    }
  } catch(e) { alert('更新失敗: ' + e.message); }
}

async function deleteTask(taskId, fromModal = false) {
  if (!confirm('このタスクを削除しますか？')) return;
  try {
    await api.del(`/api/tasks/${taskId}`);
    invalidateTasksCache();
    if (fromModal) closeModal();
    if (state.page === 'tasks') await renderTasks();
    else await renderDashboard();
  } catch(e) { alert('削除失敗: ' + e.message); }
}

        ondrop="onDrop(event, '${col.key}')">
        ${col.items.length === 0
          ? '<div class="kanban-empty">タスクなし</div>'

        }

      <button class="btn btn-slate ml-auto" onclick="renderAssign()" style="font-size:12px">🔄 更新</button>
    </div>
    <div class="kanban-board">${colsHtml}</div>`;
}

function renderKanbanCard(t) {
  const due = t.due_date ? `<span class="badge badge-${priorityFromDue(t.due_date)}" style="font-size:10px">${t.due_date}</span>` : '';
  const pri = `<span class="badge badge-${t.priority}" style="font-size:10px">${PRIORITY_LABELS[t.priority]}</span>`;
  return `
    <div class="kanban-card"
      draggable="true"
      data-id="${t.id}"
      ondragstart="onDragStart(event, ${t.id})"
      ondragend="onDragEnd(event)"
      onclick="openTask(${t.id})">
      <div class="kanban-card-title">${esc(t.summary || t.title)}${t.unread_reply ? '<span class="unread-dot" title="新着返信あり"></span>' : ''}</div>
      <div class="kanban-card-meta">
        ${pri}${due}
        ${t.chatwork_room_name ? `<span class="kanban-card-sender">📢 ${esc(t.chatwork_room_name)}</span>` : ''}
        ${t.sender_name ? `<span class="kanban-card-sender">依頼: ${esc(t.sender_name)}</span>` : ''}
      </div>
    </div>`;
}

function priorityFromDue(due) {
  if (!due) return 'low';
  const diff = Math.round((new Date(due) - new Date()) / 86400000);
  if (diff < 0)  return 'urgent';
  if (diff <= 1) return 'high';
  if (diff <= 3) return 'normal';
  return 'low';
}

function onDragStart(e, taskId) {
  dragTaskId = taskId;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.classList.add('dragging');
}

function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.kanban-drop-zone').forEach(z => z.classList.remove('drag-over'));
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

async function onDrop(e, colKey) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragTaskId) return;
  const assignee = colKey === 'inbox' ? null : colKey;
  try {
    await api.put(`/api/tasks/${dragTaskId}`, { assignee });
    dragTaskId = null;
    await renderAssign();
  } catch(err) {
    alert('更新失敗: ' + err.message);
  }
}

      <div style="background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden">
        <div style="padding:16px 20px;border-bottom:1px solid #e2e8f0;font-weight:700;font-size:15px">👤 担当者のChatworkアカウントID</div>
        <div style="padding:20px;display:flex;flex-direction:column;gap:16px">
          ${staffNames.map(name => {
            const s = settings.staff[name] || {};
            const resolved = s.room_id ? `<span style="color:#10b981;font-size:12px">✅ DMルーム解決済 (room: ${s.room_id})</span>` : `<span style="color:#94a3b8;font-size:12px">未解決 — 保存時に自動解決します</span>`;
            return `
              <div>
                <div style="display:grid;grid-template-columns:80px 1fr;align-items:center;gap:12px;margin-bottom:4px">
                  <label style="font-weight:600;color:#475569">${name}</label>
                  <input class="search-input" style="width:100%" type="text" id="account-${name}"
                    placeholder="例: 12345678" value="${esc(s.account_id || '')}">
                </div>
                <div style="margin-left:92px">${resolved}</div>
              </div>`;
          }).join('')}
          <div style="font-size:12px;color:#94a3b8;background:#f8fafc;border-radius:8px;padding:10px 12px;line-height:1.7">
            💡 ChatworkアカウントIDの確認方法：<br>
            Chatworkにログイン → 右上のアイコン → 「プロフィール」→ URLの数字 または マイページのID
          </div>
        </div>
        <div style="padding:12px 20px;border-top:1px solid #e2e8f0;display:flex;align-items:center;gap:10px;justify-content:flex-end">
          <span id="save-status" style="font-size:13px;color:#10b981"></span>
          <button class="btn btn-primary" id="btn-save-settings" onclick="saveSettings()">💾 保存・解決</button>
        </div>
      </div>

      <!-- 参加グループルーム一覧 -->
      <div style="background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden">
        <div style="padding:16px 20px;border-bottom:1px solid #e2e8f0;font-weight:700;font-size:15px">
          🏠 CS_HUBくんが参加しているグループ
          <span style="font-size:12px;font-weight:400;color:#94a3b8;margin-left:8px">自動検知 (${groupRooms.length}件) — ポーリング対象</span>
        </div>
        <div style="padding:8px 0">
          ${groupRooms.length === 0
            ? '<div style="padding:20px;text-align:center;color:#94a3b8">グループが見つかりません</div>'
            : groupRooms.map(r => `
                <div style="padding:10px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:10px">
                  <span style="font-size:18px">💬</span>
                  <span style="flex:1;font-weight:500">${esc(r.name)}</span>
                  <span style="font-size:12px;color:#94a3b8">ID: ${r.room_id}</span>
                </div>`).join('')
          }
        </div>
      </div>

    </div>`;
}

async function saveSettings() {
  const staffNames = ['金子', '和田', '福江'];
  const staff_accounts = {};
  staffNames.forEach(name => {
    staff_accounts[name] = document.getElementById(`account-${name}`).value.trim();
  });
  const btn = document.getElementById('btn-save-settings');
  const status = document.getElementById('save-status');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> 解決中...';
  status.textContent = '';
  try {
    const res = await api.put('/api/settings', { staff_accounts });
    const resolved = res.resolved || {};
    const msgs = staffNames.map(name => {
      const r = resolved[name];
      if (!r || !r.account_id) return null;
      return r.room_id ? `${name}: ✅` : `${name}: ⚠️ DM未検出`;
    }).filter(Boolean);
    status.textContent = msgs.join(' / ');
    btn.textContent = '💾 保存・解決';
    btn.disabled = false;
    await renderSettings();
  } catch(e) {
    alert('保存失敗: ' + e.message);
    btn.textContent = '💾 保存・解決';
    btn.disabled = false;
  }
}

// ─── Recurring ─────────────────────────────────────────────
async function renderRecurring() {
  const el = document.getElementById('main-content');
  const items = await api.get('/api/recurring');
  const rows = items.length === 0
    ? `<tr><td colspan="6"><div class="empty-state">定期タスクがありません</div></td></tr>`
    : items.map(r => `
        <tr>
          <td>${esc(r.title)}</td>
          <td><span class="badge ${staffClass(r.assignee)}">${r.assignee || '未担当'}</span></td>
          <td>毎月${r.day_of_month}日</td>
          <td>${r.last_generated || '—'}</td>
          <td><span class="badge ${r.active ? 'badge-in_progress' : 'badge-closed'}">${r.active ? '有効' : '無効'}</span></td>
          <td>
            <button class="btn btn-slate" style="padding:4px 8px;font-size:11px" onclick="toggleRecurring(${r.id}, ${r.active})">${r.active ? '無効化' : '有効化'}</button>
            <button class="btn btn-danger" style="padding:4px 8px;font-size:11px;margin-left:4px" onclick="deleteRecurring(${r.id})">削除</button>
          </td>
        </tr>`).join('');
  el.innerHTML = `
    <div style="display:flex;align-items:center;margin-bottom:14px">
      <div class="section-title" style="margin:0">定期タスク一覧</div>
      <button class="btn btn-primary ml-auto" onclick="openNewRecurring()">＋ 新規登録</button>
    </div>
    <div style="background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)">
      <table class="staff-table">
        <thead><tr><th>タイトル</th><th>担当者</th><th>生成日</th><th>最終生成</th><th>状態</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function openNewRecurring() {
  document.getElementById('modal-title').textContent = '定期タスク登録';
  document.getElementById('modal-body').innerHTML = `
    <div class="field"><label>タイトル *</label><input type="text" id="r-title" placeholder="月次〇〇確認"></div>
    <div class="field"><label>テンプレート本文</label><textarea id="r-template" rows="4" placeholder="詳細テキスト..."></textarea></div>
    <div class="field-row">
      <div class="field"><label>担当者</label>
        <select id="r-assignee">
          <option value="">未担当</option>
          ${STAFF.map(s => `<option value="${s}">${s}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>毎月何日</label><input type="number" id="r-day" value="1" min="1" max="28"></div>
    </div>`;
  document.getElementById('modal-footer').innerHTML = `
    <div class="ml-auto" style="display:flex;gap:8px">
      <button class="btn btn-slate" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveRecurring()">登録</button>
    </div>`;
  document.getElementById('task-overlay').classList.add('open');
}

async function saveRecurring() {
  const title = document.getElementById('r-title').value.trim();
  if (!title) { alert('タイトルを入力してください'); return; }
  await api.post('/api/recurring', {
    title,
    template:     document.getElementById('r-template').value.trim() || null,
    assignee:     document.getElementById('r-assignee').value || null,
    day_of_month: parseInt(document.getElementById('r-day').value) || 1,
  });
  closeModal();
  await renderRecurring();
}

async function toggleRecurring(id, current) {
  await api.put(`/api/recurring/${id}`, { active: current ? 0 : 1 });
  await renderRecurring();
}

async function deleteRecurring(id) {
  if (!confirm('削除しますか？')) return;
  await api.del(`/api/recurring/${id}`);
  await renderRecurring();
}

// ─── Selection / Bulk ──────────────────────────────────────
function toggleSelect(id, el) {
  if (el.checked) state.selected.add(id);
  else state.selected.delete(id);
  renderBulkBarInPlace();
}

function toggleAllSelect(el) {
  if (el.checked) state.tasks.forEach(t => state.selected.add(t.id));
  else state.selected.clear();
  renderTasks();
}

function clearSelection() {
  state.selected.clear();
  renderTasks();
}

function renderBulkBarInPlace() {
  const existing = document.querySelector('.bulk-bar');
  if (state.selected.size > 0) {
    if (existing) existing.outerHTML = renderBulkBar();
    else {
      const toolbar = document.querySelector('.toolbar');
      if (toolbar) toolbar.insertAdjacentHTML('afterend', renderBulkBar());
    }
  } else {
    if (existing) existing.remove();
  }
}

async function bulkComplete() {
  if (state.selected.size === 0) return;
  await api.post('/api/tasks/bulk', { task_ids: [...state.selected], status: 'done' });
  invalidateTasksCache();
  state.selected.clear();
  await renderTasks();
}

async function bulkDelete() {
  if (state.selected.size === 0) return;
  if (!confirm(`${state.selected.size}件のタスクを削除しますか？`)) return;
  await Promise.all([...state.selected].map(id => api.del(`/api/tasks/${id}`)));
  invalidateTasksCache();
  state.selected.clear();
  await renderTasks();
}

async function applyBulk() {
  const assignee = document.getElementById('bulk-assignee').value;
  const priority = document.getElementById('bulk-priority').value;
  const status   = document.getElementById('bulk-status').value;
  const due_date = document.getElementById('bulk-due').value;
  const data = {};
  if (assignee) data.assignee = assignee;
  if (priority) data.priority = priority;
  if (status)   data.status   = status;
  if (due_date) data.due_date = due_date;
  if (Object.keys(data).length === 0) return;
  await api.post('/api/tasks/bulk', { task_ids: [...state.selected], ...data });
  state.selected.clear();
  await renderTasks();
}

// ─── Filters ───────────────────────────────────────────────
function switchTab(tab) {
  state.tab = tab;
  state.selected.clear();
  renderTasks();
}

function setFilter(key, value) {
  state.filters[key] = value;
  renderTasks();
}

let searchTimer;
function debounceSearch(val) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { state.filters.search = val; renderTasks(); }, 300);
}

// ─── New Message ───────────────────────────────────────────
let newMsgRooms = [];

async function openNewMessage() {
  state.editingId = null;
  selectedTos = [];
  toAll = false;
  previewEnabled = false;
  activeTextareaId = 'new-msg-input';
  document.getElementById('modal-title').textContent = '✉ 新規メッセージ';
  document.getElementById('modal-body').innerHTML = `
    <div class="field">
      <label>送信先ルーム <span style="color:#dc2626">*</span></label>
      <select id="new-msg-room" onchange="onNewMsgRoomChange(this.value)" style="width:100%">
        <option value="">読み込み中...</option>
      </select>
    </div>
    <div class="to-selector" id="to-selector" style="position:relative;display:none">
      <span style="font-size:12px;font-weight:600;color:#64748b">TO:</span>
      <span id="to-tags"></span>
      <button class="to-add-btn" id="new-msg-to-btn" onclick="toggleToDropdown(document.getElementById('new-msg-room').value)">＋ 追加</button>
      <button class="to-all-btn" onclick="toggleToAll()">ALL</button>
      <div class="to-dropdown" id="to-dropdown" style="display:none"></div>
    </div>
    <div class="field">
      <label>メッセージ <span style="color:#dc2626">*</span></label>
      <textarea id="new-msg-input" rows="6" placeholder="メッセージを入力… Cmd+Enterで送信" oninput="updatePreview()" onkeydown="if((event.metaKey||event.ctrlKey)&&event.key==='Enter'){event.preventDefault();sendNewMessage();}"></textarea>
    </div>
    <div id="cw-preview-area" style="display:none">
      <div style="font-size:11px;font-weight:600;color:#64748b;margin-bottom:4px">Chatwork送信イメージ</div>
      <div class="cw-preview-wrap" id="cw-preview-content"></div>
    </div>
    <div id="attach-preview-area" style="display:none"></div>
    <div class="reply-actions">
      <input type="file" id="reply-file" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.csv,.txt,.zip" style="display:none" onchange="onFileSelected(this)">
      <button class="attach-btn" onclick="document.getElementById('reply-file').click()">📎 ファイル添付</button>
      <span id="attach-info" style="display:none"></span>
      <button class="preview-toggle" id="preview-toggle-btn" onclick="togglePreview()">👁 プレビュー</button>
    </div>`;
  document.getElementById('modal-footer').innerHTML = `
    <div class="ml-auto" style="display:flex;gap:8px">
      <button class="btn btn-slate" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" id="btn-send-new-msg" onclick="sendNewMessage()">✉ 送信</button>
    </div>`;
  document.getElementById('task-overlay').classList.add('open');

  // ルーム一覧を取得
  try {
    newMsgRooms = await api.get('/api/chatwork/rooms');
    const groupRooms = newMsgRooms.filter(r => r.type === 'group');
    const sel = document.getElementById('new-msg-room');
    sel.innerHTML = '<option value="">ルームを選択してください</option>' +
      groupRooms.map(r => `<option value="${r.room_id}">${esc(r.name)}</option>`).join('');
  } catch(e) {
    document.getElementById('new-msg-room').innerHTML = '<option value="">ルーム取得失敗</option>';
  }
}

function onNewMsgRoomChange(roomId) {
  selectedTos = [];
  toAll = false;
  renderToTags();
  const toSelector = document.getElementById('to-selector');
  if (roomId) {
    toSelector.style.display = 'flex';
  } else {
    toSelector.style.display = 'none';
  }
  updatePreview();
}

async function sendNewMessage() {
  const roomId = document.getElementById('new-msg-room').value;
  if (!roomId) { alert('送信先ルームを選択してください'); return; }
  const rawBody = document.getElementById('new-msg-input').value.trim();
  const fileInput = document.getElementById('reply-file');
  const hasFile = fileInput && fileInput.files && fileInput.files.length > 0;
  if (!rawBody && !hasFile) { alert('メッセージを入力してください'); return; }

  const toPrefix = buildToPrefix();
  const body = toPrefix + rawBody;

  const btn = document.getElementById('btn-send-new-msg');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> 送信中...';

  try {
    if (hasFile) {
      const formData = new FormData();
      formData.append('room_id', roomId);
      formData.append('body', body);
      for (let i = 0; i < fileInput.files.length; i++) {
        formData.append('files', fileInput.files[i]);
      }
      const r = await fetch('/api/chatwork/messages/file', { method: 'POST', body: formData });
      if (!r.ok) throw new Error(await r.text());
    } else {
      await api.post('/api/chatwork/messages', { room_id: roomId, body });
    }
    closeModal();
    // 成功通知（一時的なトースト）
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;bottom:24px;right:24px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.15);animation:modal-slide-up .3s ease';
    toast.textContent = '✅ メッセージを送信しました';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  } catch(e) {
    alert('送信失敗: ' + e.message);
    btn.disabled = false;
    btn.innerHTML = '✉ 送信';
  }
}

// ─── Modal utils ───────────────────────────────────────────
function closeModal() {
  document.getElementById('task-overlay').classList.remove('open');
  activeTextareaId = 'reply-input';
  previewEnabled = false;
  selectedTos = [];
  toAll = false;
  clearAttachment();
}

function maybeCloseModal(e) {
  if (e.target === document.getElementById('task-overlay')) closeModal();
}

// ─── Chatwork ──────────────────────────────────────────────
async function manualPoll() {
  const btn = document.getElementById('btn-poll');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> 取得中...';
  try {
    await api.post('/api/chatwork/poll', {});
    await render();
  } catch(e) { alert('エラー: ' + e.message); }
  btn.disabled = false;
  btn.textContent = '🔄 今すぐ取得';
}

// ─── Helpers ───────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function staffClass(name) {
  if (name === '金子') return 'badge-kaneko';
  if (name === '和田')  return 'badge-wada';
  if (name === '福江') return 'badge-fukue';
  if (name === '堀田') return 'badge-hotta';
  return 'badge-none';
}

function fmtDate(s) {
  if (!s) return '—';
  const d = new Date(s);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function fmtDatetime(s) {
  if (!s) return '—';
  const d = new Date(s);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ─── Init ──────────────────────────────────────────────────
render();
</script>
